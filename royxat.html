<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="royxat.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>
    <div class="xabar-con"></div>
    <div class="container">
        <h2>Ro'yxatdan o'tish</h2>
        <p class="subtitle">Sog'lig'ingiz bizga muhim</p>

        <form>
            <label>To'liq ism</label>
            <input id="ism" type="text" placeholder="Ismingizni kiriting">

            <label>Telefon</label>
            <input id="tel" type="text" placeholder="+998 95 257 05 22">

            <label>Tug'ilgan sana</label>
            <input id="sana" type="date" placeholder="KK.OO.YYYY">

            <label>Jinsi</label>
            <div class="gender">
                <select id="jinsi"
                    style="width: 100%; padding: 10px; border-radius: 8px; border: none; background: #f1f1f1; outline: none; cursor: pointer;">
                    <option value="" disabled selected>Tanlang</option>
                    <option value="erkak">Erkak</option>
                    <option value="ayol">Ayol</option>
                </select>
            </div>
            <label>Email</label>
            <input id="email" type="email" placeholder="example@mail.com">

            <label>Parol</label>
            <input id="parol" type="password" placeholder="********">

            <button type="button" onclick="Kirish()">Hisob yaratish</button>
        </form>

        <p class="login">Hisobingiz bormi? <a href="./kirish.html">Kiring</a></p>
    </div>

    <script src="./royhat.js"></script>
</body>

</html>
