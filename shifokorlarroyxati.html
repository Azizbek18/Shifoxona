<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBook | Shifokorlar Ro'yxati</title>
    <link rel="stylesheet" href="shidokorlarroyhati.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div id="mb-toast-container"></div>

    <header class="mb-navbar">
        <div class="mb-container">
            <div class="mb-logo" onclick="window.location.reload()" style="cursor:pointer">MedBook</div>
            <nav class="mb-nav">
                <a href="bemor.html">Asosiy</a>
                <a href="#" class="mb-active">Shifokorlar</a>
            </nav>
            <div class="mb-auth" id="mb-auth-section">
            </div>
        </div>
    </header>

    <section class="mb-hero">
        <div class="mb-container">
            <h1>Malakali Shifokorlar</h1>
            <div class="mb-search-box">
                <input type="text" id="mb-search-input" placeholder="Ism yoki yo'nalish bo'yicha qidirish...">
                <div class="mb-filter-tags" id="mb-filter-tags">
                    <button class="mb-filter-btn mb-active">Hammasi</button>
                    <button class="mb-filter-btn">Stomatolog</button>
                    <button class="mb-filter-btn">Terapevt</button>
                    <button class="mb-filter-btn">Kardiolog</button>
                    <button class="mb-filter-btn">Pediatr</button>
                </div>
            </div>
        </div>
    </section>

    <main class="mb-container">
        <div id="mb-doctors-list" class="mb-grid">
        </div>
    </main>

    <script src="shifokorlarroyhati.js"></script>
</body>

</html>
